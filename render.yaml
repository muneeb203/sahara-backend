services:
  - type: web
    name: herhaq-chatbot-api
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: USE_OLLAMA
        value: "false"
      - key: CORS_ORIGINS
        value: "*"
      - key: HF_API_MODEL
        value: "mistralai/Mistral-7B-Instruct-v0.3"
      - key: HF_API_TOKEN
        sync: false
